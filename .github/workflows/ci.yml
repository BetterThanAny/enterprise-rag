name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      POSTGRES_DB: enterprise_rag
      POSTGRES_USER: enterprise_rag
      POSTGRES_PASSWORD: ci-only-postgres-password
      DATABASE_URL: postgresql+psycopg://enterprise_rag:ci-only-postgres-password@postgres:5432/enterprise_rag
      TEST_DATABASE_URL: postgresql+psycopg://enterprise_rag:ci-only-postgres-password@127.0.0.1:15432/enterprise_rag
      TEST_REDIS_URL: redis://127.0.0.1:16379/0
      TEST_MINIO_ENDPOINT: 127.0.0.1:19000
      TEST_MINIO_ACCESS_KEY: ci-only-minio-access
      TEST_MINIO_SECRET_KEY: ci-only-minio-secret-password
      TEST_MINIO_BUCKET: enterprise-rag-documents
      REDIS_URL: redis://127.0.0.1:16379/0
      MINIO_ENDPOINT: 127.0.0.1:19000
      MINIO_ACCESS_KEY: ci-only-minio-access
      MINIO_SECRET_KEY: ci-only-minio-secret-password
      MINIO_BUCKET: enterprise-rag-documents
      JWT_SECRET: ci-only-jwt-secret-with-more-than-32-characters
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
        with:
          version: 2026.7.5
          install: true
      - name: Install locked project dependencies
        run: mise exec -- uv sync --frozen
      - name: Start stateful test dependencies
        run: |
          docker compose up -d --wait postgres redis minio
          docker compose run --rm --no-deps minio-init
      - name: Migrate test database
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: mise exec -- uv run alembic upgrade head
      - name: Lint and strict type check
        run: |
          mise exec -- uv run ruff check .
          mise exec -- uv run pyright
      - name: Full test suite and coverage gate
        run: |
          mise exec -- uv run pytest -q \
            tests/unit tests/integration tests/security tests/fault \
            --cov=enterprise_rag_core \
            --cov=enterprise_rag_api \
            --cov=enterprise_rag_worker \
            --cov-report=term-missing \
            --cov-fail-under=88
          mise exec -- uv run coverage report \
            --include='*/enterprise_rag_core/documents.py' \
            --fail-under=75
          mise exec -- uv run coverage report \
            --include='*/enterprise_rag_core/indexing.py,*/enterprise_rag_core/generation.py,*/enterprise_rag_core/retrieval.py' \
            --fail-under=85
          mise exec -- uv run coverage report \
            --include='*/enterprise_rag_worker/broker.py,*/enterprise_rag_worker/dispatcher.py,*/enterprise_rag_worker/run_job.py,*/enterprise_rag_worker/tasks.py' \
            --fail-under=95
      - name: Secret scan
        run: mise exec -- gitleaks dir . --redact --no-banner
      - name: Small deterministic quality regression
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
        run: >-
          mise exec -- uv run python scripts/evaluate_generation.py
          --dataset data/eval/generation.jsonl
          --output /tmp/m4-ci-quality.json
