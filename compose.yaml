services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-enterprise_rag}
      POSTGRES_USER: ${POSTGRES_USER:-enterprise_rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - redis-data:/data

  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    ports:
      - "127.0.0.1:${MINIO_PORT:-19000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-19001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 2s
      timeout: 3s
      retries: 30
    volumes:
      - minio-data:/data

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-enterprise-rag-documents}
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mc alias set local http://minio:9000 "$${MINIO_ACCESS_KEY}" "$${MINIO_SECRET_KEY}"
        mc mb --ignore-existing "local/$${MINIO_BUCKET}"

  ollama:
    profiles: ["local-llm"]
    image: ollama/ollama:0.30.8
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 3s
      timeout: 5s
      retries: 60
    volumes:
      - ollama-data:/root/.ollama

  ollama-init:
    profiles: ["local-llm"]
    image: ollama/ollama:0.30.8
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:0.5b}
    entrypoint: ["/bin/sh", "-ec"]
    command: ["ollama pull \"$${OLLAMA_MODEL}\""]

  migrate:
    build:
      context: .
    command: ["alembic", "upgrade", "head"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-20}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-10}
      DATABASE_POOL_TIMEOUT_SECONDS: ${DATABASE_POOL_TIMEOUT_SECONDS:-10}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-enterprise-rag-documents}
      MINIO_SECURE: "false"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      GIT_SHA: ${GIT_SHA:-unknown}
      RETRIEVAL_RRF_RANK_CONSTANT: ${RETRIEVAL_RRF_RANK_CONSTANT:-60}
      RETRIEVAL_CONFIG_VERSION: ${RETRIEVAL_CONFIG_VERSION:-postgres-fts-pgvector-rrf-v1}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-deterministic}
      FASTEMBED_MODEL_NAME: ${FASTEMBED_MODEL_NAME:-BAAI/bge-small-en-v1.5}
      FASTEMBED_CACHE_DIR: ${FASTEMBED_CACHE_DIR:-~/.cache/enterprise-rag/fastembed}
      FASTEMBED_BATCH_SIZE: ${FASTEMBED_BATCH_SIZE:-64}
      RERANKER_PROVIDER: ${RERANKER_PROVIDER:-deterministic}
      RERANKER_MODEL_NAME: ${RERANKER_MODEL_NAME:-ms-marco-TinyBERT-L-2-v2}
      RERANKER_CACHE_DIR: ${RERANKER_CACHE_DIR:-~/.cache/enterprise-rag/flashrank}
      GENERATION_PROVIDER: ${GENERATION_PROVIDER:-deterministic}
      GENERATION_TIMEOUT_SECONDS: ${GENERATION_TIMEOUT_SECONDS:-30}
      GENERATION_PROMPT_VERSION: ${GENERATION_PROMPT_VERSION:-grounded-citations-v1}
      GENERATION_CONFIG_VERSION: ${GENERATION_CONFIG_VERSION:-openai-compatible-chat-v1}
      PROVIDER_MAX_ATTEMPTS: ${PROVIDER_MAX_ATTEMPTS:-3}
      PROVIDER_RETRY_BASE_SECONDS: ${PROVIDER_RETRY_BASE_SECONDS:-0.25}
      PROVIDER_RETRY_MAX_SECONDS: ${PROVIDER_RETRY_MAX_SECONDS:-5}
      OPENAI_INPUT_COST_PER_MILLION_USD: ${OPENAI_INPUT_COST_PER_MILLION_USD:-0}
      OPENAI_OUTPUT_COST_PER_MILLION_USD: ${OPENAI_OUTPUT_COST_PER_MILLION_USD:-0}
      DEEPSEEK_INPUT_COST_PER_MILLION_USD: ${DEEPSEEK_INPUT_COST_PER_MILLION_USD:-0}
      DEEPSEEK_OUTPUT_COST_PER_MILLION_USD: ${DEEPSEEK_OUTPUT_COST_PER_MILLION_USD:-0}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
    ports:
      - "127.0.0.1:${API_PORT:-18000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=3)",
        ]
      interval: 3s
      timeout: 5s
      retries: 30

  worker:
    build:
      context: .
    command:
      - /bin/sh
      - -ec
      - |
        python -m enterprise_rag_worker.enqueue_pending
        exec dramatiq enterprise_rag_worker.tasks --processes 1 --threads 1
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-enterprise-rag-documents}
      MINIO_SECURE: "false"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      GIT_SHA: ${GIT_SHA:-unknown}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-deterministic}
      FASTEMBED_MODEL_NAME: ${FASTEMBED_MODEL_NAME:-BAAI/bge-small-en-v1.5}
      FASTEMBED_CACHE_DIR: ${FASTEMBED_CACHE_DIR:-~/.cache/enterprise-rag/fastembed}
      FASTEMBED_BATCH_SIZE: ${FASTEMBED_BATCH_SIZE:-64}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 3s
      timeout: 3s
      retries: 30

volumes:
  postgres-data:
  redis-data:
  minio-data:
  ollama-data:
